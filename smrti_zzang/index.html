<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>목탁 시뮬레이터</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    
    <style>
        body { 
            margin: 0; 
            padding: 0;
            overflow: hidden; 
            background-color: #000; 
            font-family: 'Noto Sans KR', sans-serif;
            color: white;
            touch-action: none; /* 모바일에서 화면 스크롤 방지 */
        }

        #game-container {
            position: absolute; 
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
        }

        canvas { 
            transform: scaleX(-1); /* 거울 모드 */
            width: 100vw;
            height: 100vh;
            object-fit: cover; /* 화면 비율에 맞게 꽉 채우기 */
        }
        
        video { display: none; }

        .floating-text {
            position: absolute;
            color: #ffcc00; 
            font-size: 28px; 
            font-weight: 900;
            text-shadow: 0px 4px 10px rgba(0, 0, 0, 0.8), 0px 0px 20px rgba(212, 175, 55, 0.6);
            pointer-events: none; 
            transform: translate(-50%, -50%);
            animation: floatUp 1.2s cubic-bezier(0.25, 1, 0.5, 1) forwards;
            z-index: 10;
        }

        @keyframes floatUp {
            0% { opacity: 0; transform: translate(-50%, -50%) translateY(20px) scale(0.8); }
            20% { opacity: 1; transform: translate(-50%, -50%) translateY(-10px) scale(1.1); }
            80% { opacity: 1; transform: translate(-50%, -50%) translateY(-60px) scale(1); }
            100% { opacity: 0; transform: translate(-50%, -50%) translateY(-80px) scale(0.9); }
        }

        .guide { 
            position: absolute;
            bottom: 20px;
            width: 100%;
            text-align: center;
            color: rgba(255, 255, 255, 0.7); 
            font-size: 18px; 
            z-index: 5;
            pointer-events: none;
        }

        .top-ui {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            flex-direction: column; 
            gap: 10px;
            z-index: 20;
            align-items: flex-end;
        }

        .custom-btn {
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            color: #fff;
            background-color: rgba(50, 50, 50, 0.8);
            border: 2px solid #ffcc00;
            border-radius: 12px;
            cursor: pointer;
            font-family: 'Noto Sans KR', sans-serif;
            transition: all 0.3s ease;
        }

        .custom-btn:hover { background-color: rgba(80, 80, 80, 0.9); }
        .custom-btn.active {
            background-color: #ffcc00;
            color: #000;
            box-shadow: 0 0 15px rgba(255, 204, 0, 0.6);
        }

        .counter-ui {
            position: absolute;
            top: 20px;
            left: 20px;
            padding: 15px 25px;
            font-size: 24px;
            font-weight: 900;
            color: #ffcc00;
            background-color: rgba(0, 0, 0, 0.6);
            border: 2px solid #ffcc00;
            border-radius: 15px;
            z-index: 20;
            text-shadow: 0px 2px 5px rgba(0, 0, 0, 0.8);
        }

        /* 📱 모바일 환경 반응형 UI */
        @media (max-width: 768px) {
            .counter-ui { font-size: 18px; padding: 10px 15px; top: 15px; left: 15px; }
            .top-ui { top: 15px; right: 15px; gap: 8px; }
            .custom-btn { padding: 10px 16px; font-size: 14px; }
            .guide { font-size: 14px; bottom: 30px; }
        }
    </style>
</head>
<body>

    <div id="game-container">
        <canvas class="output_canvas" width="1280" height="720"></canvas>
    </div>
    
    <div class="guide">※ 사운드 재생을 위해 처음에 화면을 아무 곳이나 한 번 클릭해주세요.</div>

    <div class="counter-ui" id="merit-counter">누적 공덕: 0</div>

    <div class="top-ui">
        <button id="sound-btn" class="custom-btn">소리 변경: 기본</button>
        <button id="minigame-btn" class="custom-btn">미니게임 모드: OFF</button>
        <button id="pin-btn" class="custom-btn">목탁 고정 모드: OFF</button>
    </div>

    <script>
        const canvasElement = document.querySelector('.output_canvas');
        const canvasCtx = canvasElement.getContext('2d');
        const gameContainer = document.getElementById('game-container');
        const pinBtn = document.getElementById('pin-btn');
        const minigameBtn = document.getElementById('minigame-btn');
        const soundBtn = document.getElementById('sound-btn');
        const counterElement = document.getElementById('merit-counter');
        
        let meritCount = localStorage.getItem('myMeritCount') ? parseInt(localStorage.getItem('myMeritCount')) : 0;
        counterElement.innerText = `누적 공덕: ${meritCount}`;

        const moktakImg = new Image();
        moktakImg.src = 'moktak.png'; 
        
        const stickImg = new Image();
        stickImg.src = 'stick.png'; 

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        let soundBuffer = null;

        fetch('moktak_sound.mp3')
            .then(response => response.arrayBuffer())
            .then(arrayBuffer => audioCtx.decodeAudioData(arrayBuffer))
            .then(decodedAudio => { soundBuffer = decodedAudio; });

        let soundMode = 0; 
        const soundRates = [1.0, 0.6]; 
        const soundLabels = ['기본', '묵직 (낮음)', '랜덤 🎲'];

        soundBtn.addEventListener('click', (e) => {
            soundMode = (soundMode + 1) % 3; 
            soundBtn.textContent = `소리 변경: ${soundLabels[soundMode]}`;
            if (audioCtx.state === 'suspended') audioCtx.resume();
            e.stopPropagation();
        });

        function playMoktakSound() {
            if (!soundBuffer) return;
            if (audioCtx.state === 'suspended') audioCtx.resume(); 

            const source = audioCtx.createBufferSource();
            source.buffer = soundBuffer;
            
            if (soundMode === 2) {
                source.playbackRate.value = Math.random() * 0.7 + 0.6; 
            } else {
                source.playbackRate.value = soundRates[soundMode]; 
            }
            
            source.connect(audioCtx.destination);
            source.start(0);
        }

        // 모바일 터치 이벤트 추가 지원
        const unlockAudio = () => {
            if (audioCtx.state === 'suspended') audioCtx.resume();
        };
        document.body.addEventListener('click', unlockAudio);
        document.body.addEventListener('touchstart', unlockAudio, {passive: true});

        let isPinned = false; 
        let isMiniGame = false;

        let flyingX = 640;
        let flyingY = 360;
        let flyingVx = 8; 
        let flyingVy = 8; 

        pinBtn.addEventListener('click', (e) => {
            isPinned = !isPinned; 
            if (isPinned) {
                isMiniGame = false; 
                minigameBtn.textContent = '미니게임 모드: OFF';
                minigameBtn.classList.remove('active');
                
                pinBtn.textContent = '목탁 고정 모드: ON';
                pinBtn.classList.add('active');
            } else {
                pinBtn.textContent = '목탁 고정 모드: OFF';
                pinBtn.classList.remove('active');
            }
            if (audioCtx.state === 'suspended') audioCtx.resume();
            e.stopPropagation(); 
        });

        minigameBtn.addEventListener('click', (e) => {
            isMiniGame = !isMiniGame;
            if (isMiniGame) {
                isPinned = false; 
                pinBtn.textContent = '목탁 고정 모드: OFF';
                pinBtn.classList.remove('active');

                minigameBtn.textContent = '미니게임 모드: ON';
                minigameBtn.classList.add('active');
                
                flyingX = canvasElement.width / 2;
                flyingY = canvasElement.height / 2;
                flyingVx = 8 * (Math.random() > 0.5 ? 1 : -1);
                flyingVy = 8 * (Math.random() > 0.5 ? 1 : -1);
            } else {
                minigameBtn.textContent = '미니게임 모드: OFF';
                minigameBtn.classList.remove('active');
            }
            if (audioCtx.state === 'suspended') audioCtx.resume();
            e.stopPropagation();
        });

        const hitPhrases = ['공덕', '열반'];

        function spawnFloatingText() {
            const el = document.createElement('div');
            el.className = 'floating-text';
            el.innerText = hitPhrases[Math.floor(Math.random() * hitPhrases.length)];
            
            const marginX = window.innerWidth * 0.1;
            const marginY = window.innerHeight * 0.1;
            const randomX = marginX + Math.random() * (window.innerWidth - marginX * 2);
            const randomY = marginY + Math.random() * (window.innerHeight - marginY * 2);

            el.style.left = randomX + 'px';
            el.style.top = randomY + 'px'; 
            gameContainer.appendChild(el);
            setTimeout(() => { el.remove(); }, 1200);
        }

        let lastHitTime = 0; 

        function isFist(landmarks) {
            return (
                landmarks[8].y > landmarks[5].y && 
                landmarks[12].y > landmarks[9].y && 
                landmarks[16].y > landmarks[13].y && 
                landmarks[20].y > landmarks[17].y    
            );
        }

        function onResults(results) {
            // ✅ [핵심 수정] 폰 환경에서 카메라 비율(가로/세로)이 다를 때 캔버스 찌그러짐 방지
            if (canvasElement.width !== results.image.width || canvasElement.height !== results.image.height) {
                canvasElement.width = results.image.width;
                canvasElement.height = results.image.height;
            }

            const canvasWidth = canvasElement.width;
            const canvasHeight = canvasElement.height;

            // ✅ [핵심 수정] 기기 해상도에 맞춰 목탁과 채 크기 동적 자동 조절
            const baseSize = Math.min(canvasWidth, canvasHeight);
            const moktakRadius = baseSize * 0.25; // 화면 짧은 쪽의 25% 크기
            const stickWidth = moktakRadius * 1.9; 
            const stickHeight = moktakRadius * 1.9;

            canvasCtx.save();
            canvasCtx.clearRect(0, 0, canvasWidth, canvasHeight);
            canvasCtx.drawImage(results.image, 0, 0, canvasWidth, canvasHeight);

            let currentMoktakX = -1000;
            let currentMoktakY = -1000;
            let isMoktakActive = false;
            let activeSticks = []; 

            if (isMiniGame) {
                flyingX += flyingVx;
                flyingY += flyingVy;

                // 동적 사이즈에 맞춘 화면 이탈 방지
                if (flyingX - moktakRadius < 0) { flyingX = moktakRadius; flyingVx *= -1; }
                if (flyingX + moktakRadius > canvasWidth) { flyingX = canvasWidth - moktakRadius; flyingVx *= -1; }
                if (flyingY - moktakRadius < 0) { flyingY = moktakRadius; flyingVy *= -1; }
                if (flyingY + moktakRadius > canvasHeight) { flyingY = canvasHeight - moktakRadius; flyingVy *= -1; }

                currentMoktakX = flyingX;
                currentMoktakY = flyingY;
                isMoktakActive = true;
            } else if (isPinned) {
                currentMoktakX = canvasWidth / 2;
                currentMoktakY = canvasHeight - moktakRadius - 50; 
                isMoktakActive = true;
            }

            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                for (let i = 0; i < results.multiHandLandmarks.length; i++) {
                    const landmarks = results.multiHandLandmarks[i];
                    const handedness = results.multiHandedness[i].label; 

                    if (handedness === 'Right') {
                        if (isPinned || isMiniGame) {
                            if (isFist(landmarks)) {
                                activeSticks.push({ x: landmarks[9].x * canvasWidth, y: landmarks[9].y * canvasHeight });
                            }
                        } else {
                            currentMoktakX = landmarks[9].x * canvasWidth;
                            currentMoktakY = landmarks[9].y * canvasHeight;
                            isMoktakActive = true;
                        }
                    } 
                    else if (handedness === 'Left') {
                        if (isFist(landmarks)) {
                            activeSticks.push({ x: landmarks[9].x * canvasWidth, y: landmarks[9].y * canvasHeight });
                        }
                    }
                }
            }

            if (isMoktakActive) {
                canvasCtx.drawImage(moktakImg, currentMoktakX - moktakRadius, currentMoktakY - moktakRadius, moktakRadius * 2, moktakRadius * 2);
            }

            let hitDetected = false;

            for (let stick of activeSticks) {
                canvasCtx.drawImage(stickImg, stick.x - stickWidth/2, stick.y - stickHeight/2, stickWidth, stickHeight);
                
                if (isMoktakActive) {
                    const dist = Math.sqrt(Math.pow(stick.x - currentMoktakX, 2) + Math.pow(stick.y - currentMoktakY, 2));
                    if (dist < moktakRadius) {
                        hitDetected = true;
                    }
                }
            }

            const now = Date.now();
            if (hitDetected) {
                if (now - lastHitTime > 150) { 
                    playMoktakSound();
                    spawnFloatingText(); 
                    
                    meritCount++;
                    counterElement.innerText = `누적 공덕: ${meritCount}`;
                    localStorage.setItem('myMeritCount', meritCount);

                    if (isMiniGame) {
                        flyingVx = -flyingVx * 1.15;
                        flyingVy = -flyingVy * 1.15;
                        
                        // 모바일에서는 화면이 좁을 수 있으니 최대 속도 제한을 해상도 비례로 설정
                        const maxSpeed = baseSize * 0.05; 
                        if (Math.abs(flyingVx) > maxSpeed) flyingVx = maxSpeed * Math.sign(flyingVx);
                        if (Math.abs(flyingVy) > maxSpeed) flyingVy = maxSpeed * Math.sign(flyingVy);
                    }
                    
                    lastHitTime = now;
                }
            }

            canvasCtx.restore();
        }

        const hands = new Hands({locateFile: (file) => {
            return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
        }});
        hands.setOptions({
            maxNumHands: 2, 
            modelComplexity: 1,
            minDetectionConfidence: 0.7,
            minTrackingConfidence: 0.7
        });
        hands.onResults(onResults);

        const video = document.createElement('video');
        video.setAttribute('playsinline', ''); // 모바일 브라우저 카메라 호환성용

        const camera = new Camera(video, {
            onFrame: async () => { await hands.send({image: video}); },
            width: 1280, 
            height: 720
        });
        camera.start();

    </script>
</body>
</html>
