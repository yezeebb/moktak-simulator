<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>목탁 시뮬레이터</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    
    <style>
        body { 
            margin: 0; 
            padding: 0;
            overflow: hidden; 
            background-color: #000; 
            font-family: 'Noto Sans KR', sans-serif;
            color: white;
            touch-action: none; 
        }

        #game-container {
            position: absolute; 
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
        }

        canvas { 
            transform: scaleX(-1); /* 거울 모드 */
            width: 100vw;
            height: 100vh;
            object-fit: cover; 
        }
        
        video { display: none; }

        .floating-text {
            position: absolute;
            color: #ffcc00; 
            font-size: 28px; 
            font-weight: 900;
            text-shadow: 0px 4px 10px rgba(0, 0, 0, 0.8), 0px 0px 20px rgba(212, 175, 55, 0.6);
            pointer-events: none; 
            transform: translate(-50%, -50%);
            animation: floatUp 1.2s cubic-bezier(0.25, 1, 0.5, 1) forwards;
            z-index: 10;
        }

        @keyframes floatUp {
            0% { opacity: 0; transform: translate(-50%, -50%) translateY(20px) scale(0.8); }
            20% { opacity: 1; transform: translate(-50%, -50%) translateY(-10px) scale(1.1); }
            80% { opacity: 1; transform: translate(-50%, -50%) translateY(-60px) scale(1); }
            100% { opacity: 0; transform: translate(-50%, -50%) translateY(-80px) scale(0.9); }
        }

        .guide { 
            position: absolute;
            bottom: 20px;
            width: 100%;
            text-align: center;
            color: rgba(255, 255, 255, 0.7); 
            font-size: 18px; 
            z-index: 5;
            pointer-events: none;
        }

        .top-ui {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            flex-direction: column; 
            gap: 10px;
            z-index: 20;
            align-items: flex-end;
        }

        .custom-btn {
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            color: #fff;
            background-color: rgba(50, 50, 50, 0.8);
            border: 2px solid #ffcc00;
            border-radius: 12px;
            cursor: pointer;
            font-family: 'Noto Sans KR', sans-serif;
            transition: all 0.3s ease;
        }

        .custom-btn:hover { background-color: rgba(80, 80, 80, 0.9); }
        .custom-btn.active {
            background-color: #ffcc00;
            color: #000;
            box-shadow: 0 0 15px rgba(255, 204, 0, 0.6);
        }

        .counter-ui {
            position: absolute;
            top: 20px;
            left: 20px;
            padding: 15px 25px;
            font-size: 24px;
            font-weight: 900;
            color: #ffcc00;
            background-color: rgba(0, 0, 0, 0.6);
            border: 2px solid #ffcc00;
            border-radius: 15px;
            z-index: 20;
            text-shadow: 0px 2px 5px rgba(0, 0, 0, 0.8);
        }

        @media (max-width: 768px) {
            .counter-ui { font-size: 18px; padding: 10px 15px; top: 15px; left: 15px; }
            .top-ui { top: 15px; right: 15px; gap: 8px; }
            .custom-btn { padding: 10px 16px; font-size: 14px; }
            .guide { font-size: 14px; bottom: 30px; }
        }
    </style>
</head>
<body>

    <div id="game-container">
        <canvas class="output_canvas" width="1280" height="720"></canvas>
    </div>
    
    <div class="guide">※ 양 손을 들고 ✊☝️.</div>

    <div class="counter-ui" id="merit-counter">누적 공덕: 0</div>

    <div class="top-ui">
        <button id="sound-btn" class="custom-btn">소리 변경: 기본</button>
        <button id="minigame-btn" class="custom-btn">미니게임 모드: OFF</button>
        <button id="pin-btn" class="custom-btn">목탁 고정 모드: OFF</button>
    </div>

    <script>
        const canvasElement = document.querySelector('.output_canvas');
        const canvasCtx = canvasElement.getContext('2d');
        const gameContainer = document.getElementById('game-container');
        const pinBtn = document.getElementById('pin-btn');
        const minigameBtn = document.getElementById('minigame-btn');
        const soundBtn = document.getElementById('sound-btn');
        const counterElement = document.getElementById('merit-counter');
        
        let meritCount = localStorage.getItem('myMeritCount') ? parseInt(localStorage.getItem('myMeritCount')) : 0;
        counterElement.innerText = `누적 공덕: ${meritCount}`;

        const moktakImg = new Image();
        moktakImg.src = 'moktak.png'; 
        
        const stickImg = new Image();
        stickImg.src = 'stick.png'; 

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        let soundBuffer = null;

        fetch('moktak_sound.mp3')
            .then(response => response.arrayBuffer())
            .then(arrayBuffer => audioCtx.decodeAudioData(arrayBuffer))
            .then(decodedAudio => { soundBuffer = decodedAudio; });

        let soundMode = 0; 
        const soundRates = [1.0, 0.6]; 
        const soundLabels = ['기본', '묵직 (낮음)', '랜덤 🎲'];

        soundBtn.addEventListener('click', (e) => {
            soundMode = (soundMode + 1) % 3; 
            soundBtn.textContent = `소리 변경: ${soundLabels[soundMode]}`;
            if (audioCtx.state === 'suspended') audioCtx.resume();
            e.stopPropagation();
        });

        function playMoktakSound() {
            if (!soundBuffer) return;
            if (audioCtx.state === 'suspended') audioCtx.resume(); 

            const source = audioCtx.createBufferSource();
            source.buffer = soundBuffer;
            
            if (soundMode === 2) {
                source.playbackRate.value = Math.random() * 0.7 + 0.6; 
            } else {
                source.playbackRate.value = soundRates[soundMode]; 
            }
            
            source.connect(audioCtx.destination);
            source.start(0);
        }

        const unlockAudio = () => {
            if (audioCtx.state === 'suspended') audioCtx.resume();
        };
        document.body.addEventListener('click', unlockAudio);
        document.body.addEventListener('touchstart', unlockAudio, {passive: true});

        let isPinned = false; 
        let isMiniGame = false;

        let flyingX = 640;
        let flyingY = 360;
        let flyingVx = 8; 
        let flyingVy = 8; 

        pinBtn.addEventListener('click', (e) => {
            isPinned = !isPinned; 
            if (isPinned) {
                isMiniGame = false; 
                minigameBtn.textContent = '미니게임 모드: OFF';
                minigameBtn.classList.remove('active');
                pinBtn.textContent = '목탁 고정 모드: ON';
                pinBtn.classList.add('active');
            } else {
                pinBtn.textContent = '목탁 고정 모드: OFF';
                pinBtn.classList.remove('active');
            }
            if (audioCtx.state === 'suspended') audioCtx.resume();
            e.stopPropagation(); 
        });

        minigameBtn.addEventListener('click', (e) => {
            isMiniGame = !isMiniGame;
            if (isMiniGame) {
                isPinned = false; 
                pinBtn.textContent = '목탁 고정 모드: OFF';
                pinBtn.classList.remove('active');
                minigameBtn.textContent = '미니게임 모드: ON';
                minigameBtn.classList.add('active');
                flyingX = canvasElement.width / 2;
                flyingY = canvasElement.height / 2;
                flyingVx = 8 * (Math.random() > 0.5 ? 1 : -1);
                flyingVy = 8 * (Math.random() > 0.5 ? 1 : -1);
            } else {
                minigameBtn.textContent = '미니게임 모드: OFF';
                minigameBtn.classList.remove('active');
            }
            if (audioCtx.state === 'suspended') audioCtx.resume();
            e.stopPropagation();
        });

        const hitPhrases = ['공덕', '🪷' ];

        function spawnFloatingText() {
            const el = document.createElement('div');
            el.className = 'floating-text';
            el.innerText = hitPhrases[Math.floor(Math.random() * hitPhrases.length)];
            
            const marginX = window.innerWidth * 0.1;
            const marginY = window.innerHeight * 0.1;
            const randomX = marginX + Math.random() * (window.innerWidth - marginX * 2);
            const randomY = marginY + Math.random() * (window.innerHeight - marginY * 2);

            el.style.left = randomX + 'px';
            el.style.top = randomY + 'px'; 
            gameContainer.appendChild(el);
            setTimeout(() => { el.remove(); }, 1200);
        }

        function getDistance(p1, p2) {
            return Math.sqrt(Math.pow(p1.x - p2.x, 2) + Math.pow(p1.y - p2.y, 2));
        }

        // ✅ [수정 1: Moktak 용] 예민한 주먹 감지 (조금만 구부려도 인식)
        function isSlightlyBentFist(landmarks) {
            // 화면 기준 (Y축 아래가 +) 끝점(TIP)이 관절(MCP)보다 아래에 있으면 구부린 것으로 판단
            // 검지(8, 5), 중지(12, 9), 약지(16, 13), 새끼(20, 17) 확인
            const indexFolded = landmarks[8].y > landmarks[5].y;
            const middleFolded = landmarks[12].y > landmarks[9].y;
            const ringFolded = landmarks[16].y > landmarks[13].y;
            const pinkyFolded = landmarks[20].y > landmarks[17].y;
            
            // 엄지를 제외한 네 손가락이 조금이라도 구부려져 있으면 주먹으로 인정
            return indexFolded && middleFolded && ringFolded && pinkyFolded;
        }

        // ✅ [수정 2: Stick 용] 검지만 편 상태 (포인팅) 감지
        function isPointing(landmarks) {
            // 검지 세움 확인: 끝점(8)이 중간관절(6)보다 위에 있음 (Y값이 작음)
            const indexErect = landmarks[8].y < landmarks[6].y;
            
            // 나머지 손가락 구부림 확인 (중지만 확인해도 충분히 구분됨)
            // 중지 구부림: 끝점(12)이 관절(10)보다 아래에 있음
            const middleFolded = landmarks[12].y > landmarks[10].y;
            
            // 검지는 펴고 중지는 굽혔을 때만 채로 인식
            return indexErect && middleFolded;
        }

        let wasInside = false; 

        function onResults(results) {
            if (canvasElement.width !== results.image.width || canvasElement.height !== results.image.height) {
                canvasElement.width = results.image.width;
                canvasElement.height = results.image.height;
            }

            const canvasWidth = canvasElement.width;
            const canvasHeight = canvasElement.height;
            const baseSize = Math.min(canvasWidth, canvasHeight);
            const moktakRadius = baseSize * 0.25; 
            const stickWidth = moktakRadius * 1.9; 
            const stickHeight = moktakRadius * 1.9;

            canvasCtx.save();
            canvasCtx.clearRect(0, 0, canvasWidth, canvasHeight);
            canvasCtx.drawImage(results.image, 0, 0, canvasWidth, canvasHeight);

            let currentMoktakX = -1000;
            let currentMoktakY = -1000;
            let isMoktakActive = false;
            let activeSticks = []; 

            if (isMiniGame) {
                flyingX += flyingVx;
                flyingY += flyingVy;
                if (flyingX - moktakRadius < 0) { flyingX = moktakRadius; flyingVx *= -1; }
                if (flyingX + moktakRadius > canvasWidth) { flyingX = canvasWidth - moktakRadius; flyingVx *= -1; }
                if (flyingY - moktakRadius < 0) { flyingY = moktakRadius; flyingVy *= -1; }
                if (flyingY + moktakRadius > canvasHeight) { flyingY = canvasHeight - moktakRadius; flyingVy *= -1; }
                currentMoktakX = flyingX;
                currentMoktakY = flyingY;
                isMoktakActive = true;
            } else if (isPinned) {
                currentMoktakX = canvasWidth / 2;
                currentMoktakY = canvasHeight - moktakRadius - 50; 
                isMoktakActive = true;
            }

            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                for (let i = 0; i < results.multiHandLandmarks.length; i++) {
                    const landmarks = results.multiHandLandmarks[i];
                    const handedness = results.multiHandedness[i].label; 

                    // ✋ 오른손 (카메라 Left) -> Stick 역할
                    if (handedness === 'Left') {
                        // 검지 포인팅 감지
                        if (isPointing(landmarks)) {
                            // 채 위치: 검지 중간 관절 (6번)
                            activeSticks.push({ x: landmarks[6].x * canvasWidth, y: landmarks[6].y * canvasHeight });
                        }
                    } 
                    // 🤚 왼손 (카메라 Right) -> Moktak 역할
                    else if (handedness === 'Right') {
                        // 고정/미니게임 모드일 땐 왼손도 채로 변신 가능
                        if (isPinned || isMiniGame) {
                            if (isPointing(landmarks)) {
                                activeSticks.push({ x: landmarks[6].x * canvasWidth, y: landmarks[6].y * canvasHeight });
                            }
                        } 
                        // 기본 모드: 왼손 주먹 쥐면 목탁 나옴
                        else {
                            // 예민한 주먹 감지 적용
                            if (isSlightlyBentFist(landmarks)) {
                                currentMoktakX = landmarks[10].x * canvasWidth;
                                currentMoktakY = landmarks[10].y * canvasHeight;
                                isMoktakActive = true;
                            }
                        }
                    }
                }
            }

            if (isMoktakActive) {
                canvasCtx.drawImage(moktakImg, currentMoktakX - moktakRadius, currentMoktakY - moktakRadius, moktakRadius * 2, moktakRadius * 2);
            }

            let currentlyInside = false; 

            for (let stick of activeSticks) {
                canvasCtx.drawImage(stickImg, stick.x - stickWidth/2, stick.y - stickHeight/2, stickWidth, stickHeight);
                
                if (isMoktakActive) {
                    const dist = getDistance(stick, {x: currentMoktakX, y: currentMoktakY});
                    if (dist < moktakRadius) {
                        currentlyInside = true; 
                    }
                }
            }

            if (currentlyInside && !wasInside) {
                playMoktakSound();
                spawnFloatingText(); 
                
                meritCount++;
                counterElement.innerText = `누적 공덕: ${meritCount}`;
                localStorage.setItem('myMeritCount', meritCount);

                if (isMiniGame) {
                    flyingVx = -flyingVx * 1.15;
                    flyingVy = -flyingVy * 1.15;
                    const maxSpeed = baseSize * 0.05; 
                    if (Math.abs(flyingVx) > maxSpeed) flyingVx = maxSpeed * Math.sign(flyingVx);
                    if (Math.abs(flyingVy) > maxSpeed) flyingVy = maxSpeed * Math.sign(flyingVy);
                }
            }

            wasInside = currentlyInside;

            canvasCtx.restore();
        }

        if (window.activeCamera) { window.activeCamera.stop(); }
        if (window.activeHands) { window.activeHands.close(); }

        const hands = new Hands({locateFile: (file) => {
            return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
        }});
        hands.setOptions({
            maxNumHands: 2, 
            modelComplexity: 1,
            minDetectionConfidence: 0.7,
            minTrackingConfidence: 0.7
        });
        hands.onResults(onResults);
        window.activeHands = hands;

        const video = document.createElement('video');
        video.setAttribute('playsinline', ''); 

        const camera = new Camera(video, {
            onFrame: async () => { await hands.send({image: video}); },
            width: 1280, 
            height: 720
        });
        window.activeCamera = camera;
        camera.start();

    </script>
</body>
</html>
