<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>AI 가상 목탁 시뮬레이터</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    
    <style>
        body { 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            background-color: #1a1a1a; 
            margin: 0; 
            font-family: 'Noto Sans KR', sans-serif;
            color: white;
        }

        #game-container {
            position: relative; 
            width: 640px;
            height: 480px;
        }

        canvas { 
            border: 5px solid #d4af37; 
            border-radius: 20px; 
            transform: scaleX(-1); /* 거울 모드 (CSS 반전) */ 
            background-color: #000; 
            box-shadow: 0 0 30px rgba(0,0,0,0.5); 
            width: 100%;
            height: 100%;
        }
        video { display: none; }

        .floating-text {
            position: absolute;
            color: #ffcc00; 
            font-size: 36px;
            font-weight: 900;
            text-shadow: 0px 4px 10px rgba(0, 0, 0, 0.8), 0px 0px 20px rgba(212, 175, 55, 0.6);
            pointer-events: none; 
            transform: translate(-50%, -50%);
            animation: floatUp 1.2s cubic-bezier(0.25, 1, 0.5, 1) forwards;
            z-index: 10;
        }

        @keyframes floatUp {
            0% { opacity: 0; transform: translate(-50%, -50%) translateY(20px) scale(0.8); }
            20% { opacity: 1; transform: translate(-50%, -50%) translateY(-10px) scale(1.1); }
            80% { opacity: 1; transform: translate(-50%, -50%) translateY(-60px) scale(1); }
            100% { opacity: 0; transform: translate(-50%, -50%) translateY(-80px) scale(0.9); }
        }

        .guide { margin-top: 20px; color: #888; font-size: 16px; }
    </style>
</head>
<body>

    <div id="game-container">
        <canvas class="output_canvas" width="640" height="480"></canvas>
    </div>
    
    <div class="guide">※ 사운드 재생을 위해 처음에 화면을 한 번 클릭해주세요.</div>

    <script>
        const canvasElement = document.querySelector('.output_canvas');
        const canvasCtx = canvasElement.getContext('2d');
        const gameContainer = document.getElementById('game-container');
        
        // --- 1. 이미지 및 사운드 자산 로드 ---
        const moktakImg = new Image();
        moktakImg.src = 'moktak.png'; 
        
        const stickImg = new Image();
        stickImg.src = 'stick.png'; 

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        let soundBuffer = null;

        fetch('moktak_sound.mp3')
            .then(response => response.arrayBuffer())
            .then(arrayBuffer => audioCtx.decodeAudioData(arrayBuffer))
            .then(decodedAudio => { soundBuffer = decodedAudio; });

        function playMoktakSound() {
            if (!soundBuffer) return;
            if (audioCtx.state === 'suspended') audioCtx.resume(); 

            const source = audioCtx.createBufferSource();
            source.buffer = soundBuffer;
            source.connect(audioCtx.destination);
            source.start(0);
        }

        document.body.addEventListener('click', () => {
            if (audioCtx.state === 'suspended') audioCtx.resume();
        });

        // --- 2. 텍스트 이펙트 설정 ---
        const hitPhrases = ['공덕', '열반', '깨닫다', '나무아미타불 🙏', '성불하십시오', '중생아 사랑해'];

        function spawnFloatingText(x, y) {
            const el = document.createElement('div');
            el.className = 'floating-text';
            el.innerText = hitPhrases[Math.floor(Math.random() * hitPhrases.length)];
            el.style.left = x + 'px';
            el.style.top = (y - 50) + 'px'; 
            gameContainer.appendChild(el);
            setTimeout(() => { el.remove(); }, 1200);
        }

        // --- 3. 물리 및 환경 설정 ---
        const canvasWidth = 640;
        const canvasHeight = 480;
        
        const moktakX = canvasWidth / 2;
        const moktakY = canvasHeight - 100; 
        const moktakRadius = 80; 
        
        let isColliding = false; 

        function onResults(results) {
            canvasCtx.save();
            canvasCtx.clearRect(0, 0, canvasWidth, canvasHeight);
            canvasCtx.drawImage(results.image, 0, 0, canvasWidth, canvasHeight);

            // 목탁 그리기
            canvasCtx.drawImage(moktakImg, moktakX - moktakRadius, moktakY - moktakRadius, moktakRadius * 2, moktakRadius * 2);

            // 손 인식 처리
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const landmarks = results.multiHandLandmarks[0]; // 첫 번째 손만 트래킹
                
                // --- [수정된 핵심 좌표 계산] ---
                // CSS에서 transform: scaleX(-1);로 반전시켰기 때문에,
                // 자바스크립트에서는 좌표를 또 반전시킬 필요가 없습니다. (1 - x를 그냥 x로 수정)
                const fingerX = landmarks[8].x * canvasWidth; 
                const fingerY = landmarks[8].y * canvasHeight;

                const stickWidth = 300; 
                const stickHeight = 300;  
                canvasCtx.drawImage(stickImg, fingerX - stickWidth/2, fingerY - stickHeight/2, stickWidth, stickHeight);

                // 충돌 감지 계산
                const dist = Math.sqrt(Math.pow(fingerX - moktakX, 2) + Math.pow(fingerY - moktakY, 2));

                if (dist < moktakRadius) {
                    if (!isColliding) {
                        playMoktakSound();
                        spawnFloatingText(moktakX, moktakY); 
                        isColliding = true; 
                    }
                } else {
                    isColliding = false; 
                }
            } else {
                isColliding = false;
            }
            canvasCtx.restore();
        }

        const hands = new Hands({locateFile: (file) => {
            return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
        }});
        hands.setOptions({
            maxNumHands: 2, // 왼손/오른손 모두 인식하게 두되 로직에서 한 손만 트래킹
            modelComplexity: 1,
            minDetectionConfidence: 0.7,
            minTrackingConfidence: 0.7
        });
        hands.onResults(onResults);

        const video = document.createElement('video');
        const camera = new Camera(video, {
            onFrame: async () => { await hands.send({image: video}); },
            width: 640,
            height: 480
        });
        camera.start();

    </script>
</body>
</html>
