<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>AI 가상 목탁 시뮬레이터</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    
    <style>
        body { 
            margin: 0; 
            padding: 0;
            overflow: hidden; 
            background-color: #000; 
            font-family: 'Noto Sans KR', sans-serif;
            color: white;
        }

        #game-container {
            position: absolute; 
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
        }

        canvas { 
            transform: scaleX(-1); 
            width: 100vw;
            height: 100vh;
            object-fit: cover; 
        }
        
        video { display: none; }

        .floating-text {
            position: absolute;
            color: #ffcc00; 
            font-size: 28px; 
            font-weight: 900;
            text-shadow: 0px 4px 10px rgba(0, 0, 0, 0.8), 0px 0px 20px rgba(212, 175, 55, 0.6);
            pointer-events: none; 
            transform: translate(-50%, -50%);
            animation: floatUp 1.2s cubic-bezier(0.25, 1, 0.5, 1) forwards;
            z-index: 10;
        }

        @keyframes floatUp {
            0% { opacity: 0; transform: translate(-50%, -50%) translateY(20px) scale(0.8); }
            20% { opacity: 1; transform: translate(-50%, -50%) translateY(-10px) scale(1.1); }
            80% { opacity: 1; transform: translate(-50%, -50%) translateY(-60px) scale(1); }
            100% { opacity: 0; transform: translate(-50%, -50%) translateY(-80px) scale(0.9); }
        }

        .guide { 
            position: absolute;
            bottom: 20px;
            width: 100%;
            text-align: center;
            color: rgba(255, 255, 255, 0.7); 
            font-size: 18px; 
            z-index: 5;
            pointer-events: none;
        }

        /* 상단 UI 버튼 묶음 */
        .top-ui {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            gap: 10px;
            z-index: 20;
        }

        .custom-btn {
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            color: #fff;
            background-color: rgba(50, 50, 50, 0.8);
            border: 2px solid #ffcc00;
            border-radius: 12px;
            cursor: pointer;
            font-family: 'Noto Sans KR', sans-serif;
            transition: all 0.3s ease;
        }

        .custom-btn:hover { background-color: rgba(80, 80, 80, 0.9); }
        .custom-btn.active {
            background-color: #ffcc00;
            color: #000;
            box-shadow: 0 0 15px rgba(255, 204, 0, 0.6);
        }

        /* 공덕 카운터 스타일 */
        .counter-ui {
            position: absolute;
            top: 20px;
            left: 20px;
            padding: 15px 25px;
            font-size: 24px;
            font-weight: 900;
            color: #ffcc00;
            background-color: rgba(0, 0, 0, 0.6);
            border: 2px solid #ffcc00;
            border-radius: 15px;
            z-index: 20;
            text-shadow: 0px 2px 5px rgba(0, 0, 0, 0.8);
        }
    </style>
</head>
<body>

    <div id="game-container">
        <canvas class="output_canvas" width="1280" height="720"></canvas>
    </div>
    
    <div class="guide">※ 사운드 재생을 위해 처음에 화면을 아무 곳이나 한 번 클릭해주세요.</div>

    <div class="counter-ui" id="merit-counter">누적 공덕: 0</div>

    <div class="top-ui">
        <button id="pin-btn" class="custom-btn">목탁 고정 모드: OFF</button>
    </div>

    <script>
        const canvasElement = document.querySelector('.output_canvas');
        const canvasCtx = canvasElement.getContext('2d');
        const gameContainer = document.getElementById('game-container');
        const pinBtn = document.getElementById('pin-btn');
        const counterElement = document.getElementById('merit-counter');
        
        // 로컬 스토리지에서 공덕 횟수 불러오기 (없으면 0)
        let meritCount = localStorage.getItem('myMeritCount') ? parseInt(localStorage.getItem('myMeritCount')) : 0;
        counterElement.innerText = `누적 공덕: ${meritCount}`;

        const moktakImg = new Image();
        moktakImg.src = 'moktak.png'; 
        
        const stickImg = new Image();
        stickImg.src = 'stick.png'; 

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        let soundBuffer = null;

        fetch('moktak_sound.mp3')
            .then(response => response.arrayBuffer())
            .then(arrayBuffer => audioCtx.decodeAudioData(arrayBuffer))
            .then(decodedAudio => { soundBuffer = decodedAudio; });

        function playMoktakSound() {
            if (!soundBuffer) return;
            if (audioCtx.state === 'suspended') audioCtx.resume(); 

            const source = audioCtx.createBufferSource();
            source.buffer = soundBuffer;
            source.connect(audioCtx.destination);
            source.start(0);
        }

        document.body.addEventListener('click', () => {
            if (audioCtx.state === 'suspended') audioCtx.resume();
        });

        let isPinned = false; 

        pinBtn.addEventListener('click', (e) => {
            isPinned = !isPinned; 
            
            if (isPinned) {
                pinBtn.textContent = '목탁 고정 모드: ON';
                pinBtn.classList.add('active');
            } else {
                pinBtn.textContent = '목탁 고정 모드: OFF';
                pinBtn.classList.remove('active');
            }
            
            if (audioCtx.state === 'suspended') audioCtx.resume();
            e.stopPropagation(); 
        });

        const hitPhrases = ['공덕', '열반', '깨닫다', '나무아미타불 🙏', '성불하십시오', '중생아 사랑해'];

        function spawnFloatingText() {
            const el = document.createElement('div');
            el.className = 'floating-text';
            el.innerText = hitPhrases[Math.floor(Math.random() * hitPhrases.length)];
            
            const marginX = window.innerWidth * 0.1;
            const marginY = window.innerHeight * 0.1;
            const randomX = marginX + Math.random() * (window.innerWidth - marginX * 2);
            const randomY = marginY + Math.random() * (window.innerHeight - marginY * 2);

            el.style.left = randomX + 'px';
            el.style.top = randomY + 'px'; 
            gameContainer.appendChild(el);
            setTimeout(() => { el.remove(); }, 1200);
        }

        const canvasWidth = 1280;
        const canvasHeight = 720;
        
        const moktakRadius = 180; 
        const stickWidth = 350; 
        const stickHeight = 350;  

        let isColliding = false; 

        function isFist(landmarks) {
            return (
                landmarks[8].y > landmarks[5].y && 
                landmarks[12].y > landmarks[9].y && 
                landmarks[16].y > landmarks[13].y && 
                landmarks[20].y > landmarks[17].y    
            );
        }

        function onResults(results) {
            canvasCtx.save();
            canvasCtx.clearRect(0, 0, canvasWidth, canvasHeight);
            canvasCtx.drawImage(results.image, 0, 0, canvasWidth, canvasHeight);

            let currentMoktakX = -1000;
            let currentMoktakY = -1000;
            let currentStickX = -1000;
            let currentStickY = -1000;
            
            let isMoktakActive = false;
            let isStickActive = false;

            if (isPinned) {
                currentMoktakX = canvasWidth / 2;
                currentMoktakY = canvasHeight - moktakRadius - 50; 
                isMoktakActive = true;
                canvasCtx.drawImage(moktakImg, currentMoktakX - moktakRadius, currentMoktakY - moktakRadius, moktakRadius * 2, moktakRadius * 2);
            }

            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                for (let i = 0; i < results.multiHandLandmarks.length; i++) {
                    const landmarks = results.multiHandLandmarks[i];
                    const handedness = results.multiHandedness[i].label;

                    if (handedness === 'Right') {
                        if (!isPinned) {
                            currentMoktakX = landmarks[9].x * canvasWidth;
                            currentMoktakY = landmarks[9].y * canvasHeight;
                            isMoktakActive = true;
                            canvasCtx.drawImage(moktakImg, currentMoktakX - moktakRadius, currentMoktakY - moktakRadius, moktakRadius * 2, moktakRadius * 2);
                        }
                    } 
                    else if (handedness === 'Left') {
                        const fistClenched = isFist(landmarks);
                        if (fistClenched) {
                            currentStickX = landmarks[9].x * canvasWidth;
                            currentStickY = landmarks[9].y * canvasHeight;
                            isStickActive = true;
                            
                            canvasCtx.drawImage(stickImg, currentStickX - stickWidth/2, currentStickY - stickHeight/2, stickWidth, stickHeight);
                        } else {
                            isStickActive = false;
                        }
                    }
                }

                if (isMoktakActive && isStickActive) {
                    const dist = Math.sqrt(Math.pow(currentStickX - currentMoktakX, 2) + Math.pow(currentStickY - currentMoktakY, 2));

                    if (dist < moktakRadius) {
                        if (!isColliding) {
                            playMoktakSound();
                            spawnFloatingText(); 
                            
                            // 목탁을 칠 때마다 공덕 카운트 증가 및 저장
                            meritCount++;
                            counterElement.innerText = `누적 공덕: ${meritCount}`;
                            localStorage.setItem('myMeritCount', meritCount);

                            isColliding = true; 
                        }
                    } else {
                        isColliding = false; 
                    }
                } else {
                    isColliding = false;
                }
            } else {
                isColliding = false;
            }
            canvasCtx.restore();
        }

        const hands = new Hands({locateFile: (file) => {
            return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
        }});
        hands.setOptions({
            maxNumHands: 2, 
            modelComplexity: 1,
            minDetectionConfidence: 0.7,
            minTrackingConfidence: 0.7
        });
        hands.onResults(onResults);

        const video = document.createElement('video');
        const camera = new Camera(video, {
            onFrame: async () => { await hands.send({image: video}); },
            width: 1280, 
            height: 720
        });
        camera.start();

    </script>
</body>
</html>
