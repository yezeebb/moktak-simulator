<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>목탁 시뮬레이터</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    
    <style>
        body { 
            margin: 0; 
            padding: 0;
            overflow: hidden; 
            background-color: #000; 
            font-family: 'Noto Sans KR', sans-serif;
            color: white;
            /* touch-action: none; (여기 있던 옵션을 삭제함) */
        }

        #game-container {
            position: absolute; 
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            touch-action: none; /* 게임 화면에만 터치 액션 제한을 걸어줌 */
            z-index: 1;
        }

        canvas { 
            transform: scaleX(-1); /* 거울 모드 */
            width: 100vw;
            height: 100vh;
            object-fit: cover; 
        }
        
        video { display: none; }

        .floating-text {
            position: absolute;
            color: #ffcc00; 
            font-size: 28px; 
            font-weight: 900;
            text-shadow: 0px 4px 10px rgba(0, 0, 0, 0.8), 0px 0px 20px rgba(212, 175, 55, 0.6);
            pointer-events: none; 
            transform: translate(-50%, -50%);
            animation: floatUp 1.2s cubic-bezier(0.25, 1, 0.5, 1) forwards;
            z-index: 10;
        }

        @keyframes floatUp {
            0% { opacity: 0; transform: translate(-50%, -50%) translateY(20px) scale(0.8); }
            20% { opacity: 1; transform: translate(-50%, -50%) translateY(-10px) scale(1.1); }
            80% { opacity: 1; transform: translate(-50%, -50%) translateY(-60px) scale(1); }
            100% { opacity: 0; transform: translate(-50%, -50%) translateY(-80px) scale(0.9); }
        }

        .guide { 
            position: absolute;
            bottom: 20px;
            width: 100%;
            text-align: center;
            color: rgba(255, 255, 255, 0.7); 
            font-size: 18px; 
            z-index: 5;
            pointer-events: none;
        }

        .top-ui {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            flex-direction: column; 
            gap: 10px;
            z-index: 20;
            align-items: flex-end;
        }

        .custom-btn {
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            color: #fff;
            background-color: rgba(50, 50, 50, 0.8);
            border: 2px solid #ffcc00;
            border-radius: 12px;
            cursor: pointer;
            font-family: 'Noto Sans KR', sans-serif;
            transition: all 0.3s ease;
        }

        .custom-btn:hover { background-color: rgba(80, 80, 80, 0.9); }
        .custom-btn.active {
            background-color: #ffcc00;
            color: #000;
            box-shadow: 0 0 15px rgba(255, 204, 0, 0.6);
        }

        .counter-ui {
            position: absolute;
            top: 20px;
            left: 20px;
            padding: 15px 25px;
            font-size: 24px;
            font-weight: 900;
            color: #ffcc00;
            background-color: rgba(0, 0, 0, 0.6);
            border: 2px solid #ffcc00;
            border-radius: 15px;
            z-index: 20;
            text-shadow: 0px 2px 5px rgba(0, 0, 0, 0.8);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .user-nickname {
            font-size: 14px;
            color: #fff;
            margin-bottom: 5px;
            font-weight: normal;
        }

        /* 모달 공통 스타일 */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 999; /* 터치 겹침 방지를 위해 최상단으로 올림 */
        }

        /* 닉네임 입력창 */
        #name-modal input {
            padding: 15px; font-size: 18px; border-radius: 8px; border: 2px solid #ffcc00;
            margin-bottom: 20px; text-align: center; background: #222; color: white; outline: none;
            pointer-events: auto; /* 터치가 확실히 먹히도록 보장 */
        }
        
        /* 랭킹창 스타일 */
        #ranking-modal { display: none; }
        .ranking-box {
            background-color: rgba(30, 30, 30, 0.95); border: 2px solid #ffcc00; border-radius: 15px;
            padding: 20px; width: 300px; max-height: 400px; overflow-y: auto; text-align: center;
        }
        #ranking-list { list-style: none; padding: 0; margin: 15px 0; }
        #ranking-list li {
            display: flex; justify-content: space-between; padding: 10px 5px;
            border-bottom: 1px solid rgba(255,204,0,0.3); font-size: 16px;
        }

        @media (max-width: 768px) {
            .counter-ui { font-size: 18px; padding: 10px 15px; top: 15px; left: 15px; }
            .top-ui { top: 15px; right: 15px; gap: 8px; }
            .custom-btn { padding: 10px 16px; font-size: 14px; }
            .guide { font-size: 14px; bottom: 30px; }
        }
    </style>
</head>
<body>

    <div id="name-modal" class="modal-overlay">
        
        <div id="new-user-ui" style="display: none; text-align: center;">
            <h2 style="color: #ffcc00;">법명을 입력하십시오 🙏</h2>
            <input type="text" id="nickname-input" placeholder="예: 은둔선사" maxlength="10">
            <br>
            <div style="display: flex; gap: 10px; justify-content: center;">
                <button class="custom-btn" onclick="startGame('new')">수행 시작</button>
                <button id="back-btn" class="custom-btn" style="background-color: #555; border-color: #777; display: none;" onclick="showReturningUserUI()">이전 화면</button>
            </div>
        </div>

        <div id="returning-user-ui" style="display: none; text-align: center;">
            <h2 style="color: #ffcc00;"><span id="welcome-name"></span>님, 돌아오셨군요! 🙏</h2>
            <p style="color: white; margin-bottom: 25px;">이전의 공덕을 이어서 쌓으시겠습니까?</p>
            
            <div style="display: flex; gap: 10px; justify-content: center; margin-bottom: 15px;">
                <button class="custom-btn" onclick="startGame('continue')">이어서 하기</button>
                <button class="custom-btn" style="background-color: #555; border-color: #777;" onclick="startGame('reset')">새로 하기</button>
            </div>
            
            <button class="custom-btn" style="background-color: transparent; border: none; text-decoration: underline; font-size: 14px; padding: 5px;" onclick="showNewUserUI()">다른 법명으로 시작</button>
        </div>

    </div>

    <div id="ranking-modal" class="modal-overlay">
        <div class="ranking-box">
            <h3 style="margin: 0; color: #ffcc00;">🏆 글로벌 공덕 랭킹</h3>
            <ul id="ranking-list"><li>수행자 정보를 불러오는 중...</li></ul>
            <button class="custom-btn" onclick="closeRanking()">닫기</button>
        </div>
    </div>

    <div id="game-container">
        <canvas class="output_canvas" width="1280" height="720"></canvas>
    </div>
    
    <div class="guide">※ 양 손을 들고 ✊☝️</div>

    <div class="counter-ui">
        <div class="user-nickname" id="display-nickname">중생</div>
        <div id="merit-counter">누적 공덕: 0</div>
    </div>

    <div class="top-ui">
        <button id="rank-btn" class="custom-btn" style="background-color: #ffcc00; color: #000;">🏆 랭킹 보기</button>
        <button id="sound-btn" class="custom-btn">소리 변경: 기본</button>
        <button id="minigame-btn" class="custom-btn">미니게임 모드: OFF</button>
        <button id="pin-btn" class="custom-btn">목탁 고정 모드: OFF</button>
    </div>

    <script>
        // ==========================================
        // 1. Firebase 설정 및 초기화
        // ==========================================
        const firebaseConfig = {
            apiKey: "AIzaSyDrd8XLjJr_oSv0SDxcQyUnoUGHOBlVbFk",
            authDomain: "moktak-simulator.firebaseapp.com",
            projectId: "moktak-simulator",
            storageBucket: "moktak-simulator.firebasestorage.app",
            messagingSenderId: "243976749782",
            appId: "1:243976749782:web:b63b861f4c8f390aa07f77",
            measurementId: "G-7ZFKKTM2JQ"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // ==========================================
        // 2. 전역 상태 및 앱 시작 로직
        // ==========================================
        let nickname = localStorage.getItem('moktak_nick') || "";
        let meritCount = localStorage.getItem('myMeritCount') ? parseInt(localStorage.getItem('myMeritCount')) : 0;
        let isStarted = false;

        const counterElement = document.getElementById('merit-counter');
        const displayNickname = document.getElementById('display-nickname');
        
        // --- 접속 기록 확인 후 모달 창 띄우기 ---
        if (nickname) {
            document.getElementById('returning-user-ui').style.display = 'block';
            document.getElementById('welcome-name').innerText = nickname;
        } else {
            document.getElementById('new-user-ui').style.display = 'block';
        }

        function showNewUserUI() {
            document.getElementById('returning-user-ui').style.display = 'none';
            document.getElementById('new-user-ui').style.display = 'block';
            document.getElementById('nickname-input').value = ""; 
            
            if (localStorage.getItem('moktak_nick')) {
                document.getElementById('back-btn').style.display = 'inline-block';
            }
        }

        function showReturningUserUI() {
            document.getElementById('new-user-ui').style.display = 'none';
            document.getElementById('returning-user-ui').style.display = 'block';
        }

        function startGame(mode) {
            if (mode === 'new') {
                const input = document.getElementById('nickname-input').value.trim();
                if (!input) { alert("법명을 입력해야 수행을 시작할 수 있습니다."); return; }
                
                if (nickname !== input) {
                    meritCount = 0; 
                }
                nickname = input;
                localStorage.setItem('moktak_nick', nickname);
            }

            displayNickname.innerText = nickname;
            document.getElementById('name-modal').style.display = 'none';
            
            if (mode === 'reset') {
                meritCount = 0;
                localStorage.setItem('myMeritCount', 0);
                syncScoreToServer(); 
                finishStartGame();
            } else {
                db.collection("rankings").doc(nickname).get().then((doc) => {
                    if (doc.exists) {
                        const serverScore = doc.data().score;
                        if (serverScore > meritCount) {
                            meritCount = serverScore;
                        }
                    } else if (mode === 'new') {
                        meritCount = 0;
                    }
                    localStorage.setItem('myMeritCount', meritCount);
                    finishStartGame();
                });
            }
        }

        function finishStartGame() {
            updateCounterUI();
            isStarted = true;
            if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
        }

        function updateCounterUI() {
            counterElement.innerText = `누적 공덕: ${meritCount}`;
        }

        // ==========================================
        // 3. 데이터베이스 저장 및 랭킹 조회 로직
        // ==========================================
        function syncScoreToServer() {
            if (!isStarted || !nickname) return;
            db.collection("rankings").doc(nickname).set({
                name: nickname,
                score: meritCount,
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            }, { merge: true });
        }

        document.getElementById('rank-btn').addEventListener('click', (e) => {
            document.getElementById('ranking-modal').style.display = 'flex';
            const list = document.getElementById('ranking-list');
            list.innerHTML = "<li>수행자 정보를 모으는 중...</li>";

            db.collection("rankings").orderBy("score", "desc").limit(10).get().then((querySnapshot) => {
                list.innerHTML = "";
                querySnapshot.forEach((doc) => {
                    const data = doc.data();
                    list.innerHTML += `<li><span>${data.name}</span> <span>${data.score}</span></li>`;
                });
            }).catch((error) => {
                list.innerHTML = "<li>랭킹을 불러오지 못했습니다.</li>";
                console.error("Error getting rankings: ", error);
            });
            e.stopPropagation();
        });

        function closeRanking() {
            document.getElementById('ranking-modal').style.display = 'none';
        }

        // ==========================================
        // 4. 사운드 및 손인식 로직
        // ==========================================
        const canvasElement = document.querySelector('.output_canvas');
        const canvasCtx = canvasElement.getContext('2d');
        const gameContainer = document.getElementById('game-container');
        const pinBtn = document.getElementById('pin-btn');
        const minigameBtn = document.getElementById('minigame-btn');
        const soundBtn = document.getElementById('sound-btn');
        
        updateCounterUI(); 

        const moktakImg = new Image();
        moktakImg.src = 'moktak.png'; 
        
        const stickImg = new Image();
        stickImg.src = 'stick.png'; 

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        let soundBuffer = null;

        fetch('moktak_sound.mp3')
            .then(response => response.arrayBuffer())
            .then(arrayBuffer => audioCtx.decodeAudioData(arrayBuffer))
            .then(decodedAudio => { soundBuffer = decodedAudio; });

        let soundMode = 0; 
        const soundRates = [1.0, 0.6]; 
        const soundLabels = ['기본', '묵직 (낮음)', '랜덤 🎲'];

        soundBtn.addEventListener('click', (e) => {
            soundMode = (soundMode + 1) % 3; 
            soundBtn.textContent = `소리 변경: ${soundLabels[soundMode]}`;
            if (audioCtx.state === 'suspended') audioCtx.resume();
            e.stopPropagation();
        });

        function playMoktakSound() {
            if (!soundBuffer) return;
            if (audioCtx.state === 'suspended') audioCtx.resume(); 

            const source = audioCtx.createBufferSource();
            source.buffer = soundBuffer;
            
            if (soundMode === 2) {
                source.playbackRate.value = Math.random() * 0.7 + 0.6; 
            } else {
                source.playbackRate.value = soundRates[soundMode]; 
            }
            
            source.connect(audioCtx.destination);
            source.start(0);
        }

        const unlockAudio = () => {
            if (audioCtx.state === 'suspended') audioCtx.resume();
        };
        document.body.addEventListener('click', unlockAudio);
        document.body.addEventListener('touchstart', unlockAudio, {passive: true});

        let isPinned = false; 
        let isMiniGame = false;

        let flyingX = 640;
        let flyingY = 360;
        let flyingVx = 8; 
        let flyingVy = 8; 

        pinBtn.addEventListener('click', (e) => {
            isPinned = !isPinned; 
            if (isPinned) {
                isMiniGame = false; 
                minigameBtn.textContent = '미니게임 모드: OFF';
                minigameBtn.classList.remove('active');
                pinBtn.textContent = '목탁 고정 모드: ON';
                pinBtn.classList.add('active');
            } else {
                pinBtn.textContent = '목탁 고정 모드: OFF';
                pinBtn.classList.remove('active');
            }
            if (audioCtx.state === 'suspended') audioCtx.resume();
            e.stopPropagation(); 
        });

        minigameBtn.addEventListener('click', (e) => {
            isMiniGame = !isMiniGame;
            if (isMiniGame) {
                isPinned = false; 
                pinBtn.textContent = '목탁 고정 모드: OFF';
                pinBtn.classList.remove('active');
                minigameBtn.textContent = '미니게임 모드: ON';
                minigameBtn.classList.add('active');
                flyingX = canvasElement.width / 2;
                flyingY = canvasElement.height / 2;
                flyingVx = 8 * (Math.random() > 0.5 ? 1 : -1);
                flyingVy = 8 * (Math.random() > 0.5 ? 1 : -1);
            } else {
                minigameBtn.textContent = '미니게임 모드: OFF';
                minigameBtn.classList.remove('active');
            }
            if (audioCtx.state === 'suspended') audioCtx.resume();
            e.stopPropagation();
        });

        const hitPhrases = ['공덕', '🪷' ];

        function spawnFloatingText() {
            const el = document.createElement('div');
            el.className = 'floating-text';
            el.innerText = hitPhrases[Math.floor(Math.random() * hitPhrases.length)];
            
            const marginX = window.innerWidth * 0.1;
            const marginY = window.innerHeight * 0.1;
            const randomX = marginX + Math.random() * (window.innerWidth - marginX * 2);
            const randomY = marginY + Math.random() * (window.innerHeight - marginY * 2);

            el.style.left = randomX + 'px';
            el.style.top = randomY + 'px'; 
            gameContainer.appendChild(el);
            setTimeout(() => { el.remove(); }, 1200);
        }

        function getDistance(p1, p2) {
            return Math.sqrt(Math.pow(p1.x - p2.x, 2) + Math.pow(p1.y - p2.y, 2));
        }

        function isSlightlyBentFist(landmarks) {
            const indexFolded = landmarks[8].y > landmarks[5].y;
            const middleFolded = landmarks[12].y > landmarks[9].y;
            const ringFolded = landmarks[16].y > landmarks[13].y;
            const pinkyFolded = landmarks[20].y > landmarks[17].y;
            return indexFolded && middleFolded && ringFolded && pinkyFolded;
        }

        function isPointing(landmarks) {
            const indexErect = landmarks[8].y < landmarks[6].y;
            const middleFolded = landmarks[12].y > landmarks[10].y;
            return indexErect && middleFolded;
        }

        let wasInside = false; 

        function onResults(results) {
            if (canvasElement.width !== results.image.width || canvasElement.height !== results.image.height) {
                canvasElement.width = results.image.width;
                canvasElement.height = results.image.height;
            }

            const canvasWidth = canvasElement.width;
            const canvasHeight = canvasElement.height;
            const baseSize = Math.min(canvasWidth, canvasHeight);
            const moktakRadius = baseSize * 0.25; 
            const stickWidth = moktakRadius * 1.9; 
            const stickHeight = moktakRadius * 1.9;

            canvasCtx.save();
            canvasCtx.clearRect(0, 0, canvasWidth, canvasHeight);
            canvasCtx.drawImage(results.image, 0, 0, canvasWidth, canvasHeight);

            let currentMoktakX = -1000;
            let currentMoktakY = -1000;
            let isMoktakActive = false;
            let activeSticks = []; 

            if (isMiniGame) {
                flyingX += flyingVx;
                flyingY += flyingVy;
                if (flyingX - moktakRadius < 0) { flyingX = moktakRadius; flyingVx *= -1; }
                if (flyingX + moktakRadius > canvasWidth) { flyingX = canvasWidth - moktakRadius; flyingVx *= -1; }
                if (flyingY - moktakRadius < 0) { flyingY = moktakRadius; flyingVy *= -1; }
                if (flyingY + moktakRadius > canvasHeight) { flyingY = canvasHeight - moktakRadius; flyingVy *= -1; }
                currentMoktakX = flyingX;
                currentMoktakY = flyingY;
                isMoktakActive = true;
            } else if (isPinned) {
                currentMoktakX = canvasWidth / 2;
                currentMoktakY = canvasHeight - moktakRadius - 50; 
                isMoktakActive = true;
            }

            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                for (let i = 0; i < results.multiHandLandmarks.length; i++) {
                    const landmarks = results.multiHandLandmarks[i];
                    const handedness = results.multiHandedness[i].label; 

                    if (handedness === 'Left') {
                        if (isPointing(landmarks)) {
                            activeSticks.push({ x: landmarks[6].x * canvasWidth, y: landmarks[6].y * canvasHeight });
                        }
                    } 
                    else if (handedness === 'Right') {
                        if (isPinned || isMiniGame) {
                            if (isPointing(landmarks)) {
                                activeSticks.push({ x: landmarks[6].x * canvasWidth, y: landmarks[6].y * canvasHeight });
                            }
                        } 
                        else {
                            if (isSlightlyBentFist(landmarks)) {
                                currentMoktakX = landmarks[10].x * canvasWidth;
                                currentMoktakY = landmarks[10].y * canvasHeight;
                                isMoktakActive = true;
                            }
                        }
                    }
                }
            }

            if (isMoktakActive) {
                canvasCtx.drawImage(moktakImg, currentMoktakX - moktakRadius, currentMoktakY - moktakRadius, moktakRadius * 2, moktakRadius * 2);
            }

            let currentlyInside = false; 

            for (let stick of activeSticks) {
                canvasCtx.drawImage(stickImg, stick.x - stickWidth/2, stick.y - stickHeight/2, stickWidth, stickHeight);
                
                if (isMoktakActive) {
                    const dist = getDistance(stick, {x: currentMoktakX, y: currentMoktakY});
                    if (dist < moktakRadius) {
                        currentlyInside = true; 
                    }
                }
            }

            if (currentlyInside && !wasInside && isStarted) {
                playMoktakSound();
                spawnFloatingText(); 
                
                meritCount++;
                updateCounterUI();
                localStorage.setItem('myMeritCount', meritCount);

                if (meritCount % 5 === 0) {
                    syncScoreToServer();
                }

                if (isMiniGame) {
                    flyingVx = -flyingVx * 1.15;
                    flyingVy = -flyingVy * 1.15;
                    const maxSpeed = baseSize * 0.05; 
                    if (Math.abs(flyingVx) > maxSpeed) flyingVx = maxSpeed * Math.sign(flyingVx);
                    if (Math.abs(flyingVy) > maxSpeed) flyingVy = maxSpeed * Math.sign(flyingVy);
                }
            }

            wasInside = currentlyInside;
            canvasCtx.restore();
        }

        if (window.activeCamera) { window.activeCamera.stop(); }
        if (window.activeHands) { window.activeHands.close(); }

        const hands = new Hands({locateFile: (file) => {
            return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
        }});
        hands.setOptions({
            maxNumHands: 2, 
            modelComplexity: 1,
            minDetectionConfidence: 0.7,
            minTrackingConfidence: 0.7
        });
        hands.onResults(onResults);
        window.activeHands = hands;

        const video = document.createElement('video');
        video.setAttribute('playsinline', ''); 

        const camera = new Camera(video, {
            onFrame: async () => { await hands.send({image: video}); },
            width: 1280, 
            height: 720
        });
        window.activeCamera = camera;
        camera.start();

    </script>
</body>
</html>
